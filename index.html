<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLL FOREST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
:root {
  --bg: #b5dea0;
  --pink: #f08080;
  --pink-dark: #b84040;
  --cream: #fdf4ec;
  --text: #6b3f2a;
  --star-gold: #f5c842;
  --star-dim: #d4b080;
  --tile-size: 72px; /* 動態由 JS 覆蓋 */
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen { display:none; position:absolute; inset:0; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }

/* ── TITLE ── */
#s-title { background: radial-gradient(ellipse at 50% 40%, #cce8a8, #9acc78); }
.title-logo {
  font-size: clamp(48px, 10vw, 80px);
  font-weight: 900;
  color: #f08080;
  text-shadow: 4px 5px 0 #b84040, 7px 8px 0 rgba(0,0,0,0.12);
  letter-spacing: 6px;
  animation: float 2.5s ease-in-out infinite;
  margin-bottom: 32px;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.title-deco { font-size: 52px; display:flex; gap:16px; margin-bottom: 32px; }
.title-tap { color:rgba(255,255,255,0.9); font-size:18px; font-weight:700; letter-spacing:2px; animation:blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.title-tree-panel {
  width:min(420px, 92vw);
  background:rgba(255,255,255,0.36);
  border:2px solid rgba(255,255,255,0.45);
  border-radius:22px;
  padding:12px;
  margin:-8px 0 22px;
  box-shadow:0 8px 24px rgba(65,100,45,0.14);
}
.title-tree-heading {
  color:var(--text);
  font-size:16px;
  font-weight:900;
  text-align:center;
  margin-bottom:9px;
}
.title-tree-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.title-tree-hint {
  margin-top:8px;
  text-align:center;
  font-size:12px;
  font-weight:800;
  color:#8a684a;
}
@media (max-height: 720px) {
  .title-logo { margin-bottom:18px; }
  .title-deco { margin-bottom:18px; font-size:38px; }
  .title-tree-panel { margin-bottom:14px; }
}
@media (max-width: 420px) {
  .title-tree-grid { grid-template-columns:repeat(2,1fr); }
}


/* ── MODE SELECT ── */
#s-mode { background: radial-gradient(ellipse at 50% 30%, #d0f0b0, #a0cc80); gap:16px; padding:24px; justify-content:flex-start; overflow-y:auto; }
#s-mode.active { display:flex; }
.mode-title { font-size:26px; font-weight:900; color:var(--text); margin-bottom:8px; }
.mode-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; width:min(360px,90vw); }
.mode-btn {
  padding: 14px 8px;
  border-radius: 18px; border: none;
  background: linear-gradient(160deg, #fde8d8, #f5c4a8);
  box-shadow: 0 4px 0 #c08060;
  color: var(--text); font-family:inherit; font-size:14px; font-weight:800;
  cursor:pointer; transition:transform .12s, box-shadow .12s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.mode-btn:hover { transform:translateY(-2px); }
.mode-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #c08060; }
.mode-btn .mode-icon { font-size:26px; }
.mode-btn .mode-prog { font-size:11px; color:#b06040; font-weight:700; }
.btn-back-mode {
  margin-top:8px; padding:10px 28px; border-radius:20px; border:none;
  background:rgba(255,255,255,0.6); color:var(--text);
  font-family:inherit; font-size:15px; font-weight:800; cursor:pointer;
}

.tree-select-panel {
  width:min(430px, 92vw);
  background:rgba(255,255,255,0.34);
  border:2px solid rgba(255,255,255,0.35);
  border-radius:22px;
  padding:12px;
  box-shadow:0 8px 24px rgba(65,100,45,0.12);
}
.tree-select-title {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  color:var(--text);
  font-size:15px;
  font-weight:900;
  margin-bottom:9px;
}
.tree-selected-name { color:#b06040; font-size:13px; }
.tree-select-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.tree-btn {
  min-height:62px;
  border:none;
  border-radius:16px;
  background:linear-gradient(160deg,#ffffff,#f5eadc);
  box-shadow:0 3px 0 #c8a888;
  color:var(--text);
  font-family:inherit;
  font-weight:900;
  font-size:13px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  transition:transform .12s, box-shadow .12s, outline .12s;
}
.tree-btn:hover { transform:translateY(-2px); }
.tree-btn:active { transform:translateY(1px); box-shadow:0 1px 0 #c8a888; }
.tree-btn.active {
  outline:3px solid rgba(240,128,128,0.85);
  background:linear-gradient(160deg,#fff2ee,#ffd1c6);
}
.tree-btn .tree-icon { font-size:24px; line-height:1; }
.tree-btn .tree-file { font-size:10px; color:#9b6a4a; }
.tree-load-status { margin-top:8px; text-align:center; font-size:12px; font-weight:900; color:#8a684a; }
@media (max-width: 420px) {
  .tree-select-grid { grid-template-columns:repeat(2,1fr); }
  .tree-btn { min-height:56px; }
}

/* ── LEVEL SELECT ── */
#s-level { background: radial-gradient(ellipse at 50% 30%, #d0f0b0, #a0cc80); padding:20px; }
.ls-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.ls-back { width:40px; height:40px; border-radius:12px; border:none; background:rgba(255,255,255,0.6); font-size:18px; cursor:pointer; }
.ls-title { font-size:20px; font-weight:900; color:var(--text); }
.ls-scroll { max-height:70vh; overflow-y:auto; width:min(360px,92vw); padding-right:4px; }
.ls-scroll::-webkit-scrollbar { width:4px; }
.ls-scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.15); border-radius:4px; }
.ls-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.lv-btn {
  aspect-ratio:1; border-radius:14px; border:none;
  background:linear-gradient(160deg,#fde8d8,#f5c4a8);
  box-shadow:0 3px 0 #c08060;
  color:var(--text); font-family:inherit; font-size:18px; font-weight:900;
  cursor:pointer; transition:transform .12s;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
}
.lv-btn:hover { transform:translateY(-2px); }
.lv-btn:active { transform:translateY(1px); box-shadow:0 1px 0 #c08060; }
.lv-stars { display:flex; gap:1px; font-size:11px; }
.lv-btn.locked { opacity:0.45; filter:grayscale(0.5); cursor:not-allowed; }

/* ── GAME ── */
#s-game { position:relative; }
.hud { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:10px 14px; pointer-events:none; z-index:10; }
.hud-left { display:flex; gap:8px; pointer-events:all; flex-shrink:0; }
.hud-center { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; pointer-events:none; }
.hud-right { display:flex; flex-direction:column; align-items:flex-end; justify-content:center; flex-shrink:0; pointer-events:none; min-width:60px; }
.hud-btn { width:42px; height:42px; border-radius:12px; border:none; background:rgba(255,255,255,0.72); font-size:18px; cursor:pointer; box-shadow:0 2px 0 rgba(0,0,0,0.08); transition:transform .1s; display:flex; align-items:center; justify-content:center; }
.hud-btn:hover { transform:scale(1.06); }
.hud-steps { font-size:16px; font-weight:900; color:var(--pink); text-shadow:1px 1px 0 rgba(255,255,255,0.6); white-space:nowrap; }
.hud-lv { font-size:14px; font-weight:800; color:var(--pink); white-space:nowrap; }

.minimap { position:absolute; top:64px; right:14px; display:grid; gap:3px; background:rgba(255,255,255,0.28); border-radius:8px; padding:5px; }
.mm-cell { width:14px; height:14px; border-radius:3px; background:#d4a87a; transition:background .25s; }
.mm-cell.tree { background:#7ec850; }
.mm-cell.hidden { background:transparent; border:1.5px dashed rgba(0,0,0,0.12); }

.iso-wrap {
  margin-top:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  overflow:hidden;
}
.iso-grid { display:grid; }

#three-canvas {
  width: 100%;
  height: calc(100vh - 76px);
  display: block;
  border-radius: 18px;
  touch-action: none;
  cursor: pointer;
}
.three-tip {
  position:absolute; left:50%; bottom:34px; transform:translateX(-50%);
  padding:6px 12px; border-radius:999px;
  background:rgba(255,255,255,.48); color:rgba(107,63,42,.86);
  font-size:12px; font-weight:900; letter-spacing:1px; z-index:9;
  pointer-events:none; backdrop-filter:blur(4px);
}

.zoom-control {
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  width:52px;
  height:174px;
  border-radius:28px;
  background:rgba(255,255,255,.56);
  box-shadow:0 8px 22px rgba(80,70,40,.18), inset 0 1px 0 rgba(255,255,255,.8);
  z-index:12;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:8px 6px;
  backdrop-filter:blur(8px);
  pointer-events:all;
  user-select:none;
}
.zoom-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:linear-gradient(160deg, #fde8d8, #f5c4a8);
  box-shadow:0 3px 0 #c08060;
  color:var(--text);
  font-family:inherit;
  font-size:24px;
  line-height:1;
  font-weight:900;
  cursor:pointer;
  touch-action:manipulation;
}
.zoom-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #c08060; }
.zoom-track {
  position:relative;
  width:8px;
  flex:1;
  margin:10px 0;
  border-radius:999px;
  background:rgba(107,63,42,.18);
  overflow:hidden;
}
.zoom-fill {
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:50%;
  border-radius:999px;
  background:var(--pink);
}
@media (max-width: 600px) {
  .zoom-control { right:10px; height:160px; width:48px; }
  .zoom-btn { width:36px; height:36px; font-size:22px; }
  .three-tip { bottom:20px; font-size:11px; }
}

/* Tile */
.tile-wrap { display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
.tile { position:relative; width:var(--tile-size); height:var(--tile-size); transition:transform .12s; user-select:none; }
.tile-wrap.hidden { visibility:hidden; }
.tile:hover .tile-top { filter:brightness(1.1); }

.tile-top {
  position:absolute; width:54px; height:54px;
  top:3px; left:9px;
  transform:rotateX(50deg) rotateZ(45deg);
  border-radius:5px;
  transition:background .22s;
}
.tile-right { position:absolute; width:15px; height:20px; bottom:6px; right:4px; transform:skewY(-30deg); border-radius:0 0 2px 0; }
.tile-left  { position:absolute; width:15px; height:20px; bottom:6px; left:9px;  transform:skewY(30deg);  border-radius:0 0 0 2px; }

.tile.dirt .tile-top   { background:linear-gradient(135deg,#e8a87c,#c47848); box-shadow:inset 0 0 8px rgba(0,0,0,.1); }
.tile.dirt .tile-right { background:#8a4828; }
.tile.dirt .tile-left  { background:#a05830; }

.tile.tree .tile-top   { background:linear-gradient(135deg,#a0dc6e,#6eb840); }
.tile.tree .tile-right { background:#3a7820; }
.tile.tree .tile-left  { background:#4a9030; }

/* Mode 2: "2" cell = already-tree shown differently */
.tile.fixed-tree .tile-top   { background:linear-gradient(135deg,#d4e880,#a8cc40); }
.tile.fixed-tree .tile-right { background:#607810; }
.tile.fixed-tree .tile-left  { background:#789020; }

.tile-deco {
  position:absolute; top:-22px; left:50%;
  transform:translateX(-50%) scale(0);
  font-size:24px; pointer-events:none;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.18));
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  opacity:0;
}
.tile.tree .tile-deco,
.tile.fixed-tree .tile-deco {
  transform:translateX(-50%) scale(1); opacity:1;
  animation:treeSpawn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes treeSpawn { 0%{transform:translateX(-50%) scale(.2); opacity:0} 100%{transform:translateX(-50%) scale(1); opacity:1} }

.tile.clicking { animation:tileClick .18s ease; }
@keyframes tileClick { 0%{transform:scale(1)} 45%{transform:scale(.88)} 100%{transform:scale(1)} }
.tile.ripple .tile-top { animation:ripple .28s ease; }
@keyframes ripple { 0%{filter:brightness(1.5)} 100%{filter:brightness(1)} }

/* Target-mode highlight */
.tile.target-1 .tile-top { box-shadow:inset 0 0 0 3px rgba(240,200,60,.9); }
.tile.target-2 .tile-top { box-shadow:inset 0 0 0 3px rgba(80,200,120,.9); }

/* ── OVERLAYS ── */
.overlay {
  display:none; position:absolute; inset:0;
  align-items:center; justify-content:center; flex-direction:column;
  gap:14px; z-index:20; backdrop-filter:blur(5px);
}
.overlay.show { display:flex; animation:ovIn .35s cubic-bezier(.34,1.56,.64,1); }
@keyframes ovIn { 0%{transform:scale(.75); opacity:0} 100%{transform:scale(1); opacity:1} }

#ov-complete { background:rgba(180,215,245,.88); }
#ov-gameover { background:rgba(60,30,20,.72); }

.ov-stars { display:flex; gap:6px; font-size:50px; }
.ov-star { animation:starPop .4s cubic-bezier(.34,1.56,.64,1) both; }
.ov-star:nth-child(1){animation-delay:.08s} .ov-star:nth-child(2){animation-delay:.22s} .ov-star:nth-child(3){animation-delay:.36s}
@keyframes starPop { 0%{transform:scale(0) rotate(-20deg); opacity:0} 100%{transform:scale(1) rotate(0); opacity:1} }

.ov-title { font-size:40px; font-weight:900; color:var(--pink); text-shadow:3px 3px 0 rgba(255,255,255,.5); }
.ov-sub   { font-size:16px; font-weight:700; color:var(--text); }
.ov-go-title { font-size:34px; font-weight:900; color:#fff; }
.ov-go-sub   { font-size:15px; color:rgba(255,255,255,.8); }
.ov-btns { display:flex; flex-direction:column; gap:9px; margin-top:4px; }
.ov-btns-row { display:flex; gap:9px; }

.btn {
  padding:11px 28px; border-radius:22px; border:none;
  font-family:inherit; font-size:16px; font-weight:800; letter-spacing:2px;
  cursor:pointer; transition:transform .1s, box-shadow .1s;
}
.btn:hover { transform:translateY(-2px); }
.btn:active { transform:translateY(2px) !important; }
.btn-pink  { background:var(--pink); color:#fff; box-shadow:0 4px 0 var(--pink-dark); }
.btn-cream { background:var(--cream); color:var(--text); box-shadow:0 4px 0 #c8a888; }
.btn-sm    { font-size:14px; padding:9px 20px; }

.brand { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:12px; font-weight:900; letter-spacing:5px; color:rgba(255,255,255,.4); pointer-events:none; }
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <div class="title-logo">ROLL FOREST</div>
  <div class="title-deco" id="title-logo"><img src="" id="logo-img" style="max-height:48px;vertical-align:middle;" onerror="this.style.display='none'">🌲 Roll Forest 🌲</div>
<script>
if(typeof UI_IMGS !== 'undefined' && UI_IMGS.logo) {
  document.getElementById('logo-img').src = UI_IMGS.logo;
}
</script>
  <div class="title-tree-panel">
    <div class="title-tree-heading">🌲 先選樹模型 <span class="tree-selected-name" id="title-tree-selected-name">—</span></div>
    <div class="title-tree-grid" id="title-tree-grid"></div>
    <div class="title-tree-hint">選好後點下方開始遊戲</div>
    <div class="tree-load-status" id="title-tree-load-status">目前使用：森林樹 1</div>
  </div>
  <div class="title-tap">＜ 點任意處開始 ＞</div>
  <div class="brand">ROLL FOREST</div>
</div>

<!-- MODE SELECT -->
<div id="s-mode" class="screen">
  <div class="mode-title">🌿 選擇模式</div>
  <div class="tree-select-panel">
    <div class="tree-select-title">
      <span>🌲 選擇樹模型</span>
      <span class="tree-selected-name" id="tree-selected-name">—</span>
    </div>
    <div class="tree-select-grid" id="tree-select-grid"></div>
    <div class="tree-load-status" id="tree-load-status">目前使用：森林樹 1</div>
  </div>
  <div class="mode-grid" id="mode-grid"></div>
  <button class="btn-back-mode" id="btn-mode-back">← 回標題</button>
  <div class="brand">ROLL FOREST</div>
</div>

<!-- LEVEL SELECT -->
<div id="s-level" class="screen">
  <div class="ls-header">
    <button class="ls-back" id="btn-ls-back">←</button>
    <div class="ls-title" id="ls-title">轉轉森林</div>
  </div>
  <div class="ls-scroll"><div class="ls-grid" id="ls-grid"></div></div>
  <div class="brand">ROLL FOREST</div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="hud">
    <div class="hud-left">
      <button class="hud-btn" id="btn-back-game">🏠</button>
      <button class="hud-btn" id="btn-reset-game">↺</button>
    </div>
    <div class="hud-center">
      <div class="hud-steps" id="hud-steps">剩餘步數：—</div>
    </div>
    <div class="hud-right">
      <div class="hud-lv" id="hud-lv">Lv.1-1</div>
    </div>
  </div>
  <div class="minimap" id="minimap"></div>
  <div class="iso-wrap"><canvas id="three-canvas"></canvas><div class="iso-grid" id="iso-grid" aria-hidden="true" style="display:none"></div></div>
  <div class="three-tip">拖曳旋轉視角｜點擊方塊翻轉森林</div>
  <div class="zoom-control" id="zoom-control" aria-label="鏡頭遠近控制">
    <button class="zoom-btn" id="zoom-in" type="button" aria-label="拉近鏡頭">+</button>
    <div class="zoom-label">鏡頭遠近</div>
    <div class="zoom-track" id="zoom-track" aria-hidden="true"><div class="zoom-fill" id="zoom-fill"></div></div>
    <button class="zoom-btn" id="zoom-out" type="button" aria-label="拉遠鏡頭">-</button>
  </div>
  <div class="brand">ROLL FOREST</div>

  <!-- complete overlay -->
  <div class="overlay" id="ov-complete">
    <div class="ov-stars" id="ov-stars"></div>
    <div class="ov-title">COMPLETE</div>
    <div class="ov-sub" id="ov-lv-text">Lv.1-1</div>
    <div class="ov-btns">
      <button class="btn btn-pink" id="btn-next">下 一 關 ▶</button>
      <div class="ov-btns-row">
        <button class="btn btn-cream btn-sm" id="btn-restart-ok">重新開始</button>
        <button class="btn btn-cream btn-sm" id="btn-menu-ok">回主選單</button>
      </div>
    </div>
  </div>

  <!-- gameover overlay -->
  <div class="overlay" id="ov-gameover">
    <div class="ov-go-title">步數用完了 😢</div>
    <div class="ov-go-sub">再試一次吧！</div>
    <div class="ov-btns-row" style="margin-top:8px">
      <button class="btn btn-pink btn-sm" id="btn-restart-go">重新開始</button>
      <button class="btn btn-cream btn-sm" id="btn-menu-go">回選單</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

function getSelectedTreeModel() {
  return TREE_MODELS.find(m => m.id === selectedTreeModelId) || TREE_MODELS[0];
}

function selectTreeModel(id) {
  selectedTreeModelId = id;
  localStorage.setItem('rollForestSelectedTreeModel', id);
  buildTreeSelect();
  const selected = getSelectedTreeModel();
  setTreeLoadStatus(`已選擇：${selected.name}，進入遊戲後會使用這棵樹`);
}

function preloadTreeModel(model) {
  if (!model) return Promise.resolve(null);
  if (treeModelCache.has(model.id)) return treeModelCache.get(model.id);
  const promise = gltfLoader.loadAsync(model.file)
    .then(gltf => gltf.scene)
    .catch(err => {
      console.warn('Tree model load failed:', model.file, err);
      return null;
    });
  treeModelCache.set(model.id, promise);
  return promise;
}

function cloneTreeModel(root) {
  if (!root) return null;
  const clone = root.clone(true);
  clone.traverse(obj => {
    if (obj.isMesh) {
      obj.castShadow = true;
      obj.receiveShadow = true;
      if (obj.geometry) obj.geometry = obj.geometry.clone();
      if (obj.material) {
        obj.material = Array.isArray(obj.material)
          ? obj.material.map(m => m.clone())
          : obj.material.clone();
      }
    }
  });
  return clone;
}

function normalizeTreeModel(modelRoot) {
  const box = new THREE.Box3().setFromObject(modelRoot);
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 1.22 / maxDim;
  modelRoot.scale.setScalar(scale);

  const afterBox = new THREE.Box3().setFromObject(modelRoot);
  const afterCenter = new THREE.Vector3();
  afterBox.getCenter(afterCenter);
  modelRoot.position.x -= afterCenter.x;
  modelRoot.position.z -= afterCenter.z;
  modelRoot.position.y -= afterBox.min.y;
}

function randTree() {

  audioUnlocked = true;

function playBGM() {
  const bgm = gameAudio.bgm;
  if (!bgm.paused) return;
  bgm.play().catch(() => {
    // 手機瀏覽器需要玩家先觸碰畫面，下一次互動會再嘗試播放。
    audioUnlocked = false;
  });
}

function playSfx(name) {
  const base = gameAudio[name];
  if (!base) return;
  try {
    const sound = base.cloneNode(true);
    sound.volume = base.volume;
    sound.play().catch(() => {});
  } catch (err) {
    try {
      base.currentTime = 0;
      base.play().catch(() => {});
    } catch (_) {}
  }
}

}

function buildTreeSelect() {
  const wraps = [
    document.getElementById('tree-select-grid'),
    document.getElementById('title-tree-grid')
  ].filter(Boolean);
  const nameEls = [document.getElementById('tree-selected-name'), document.getElementById('title-tree-selected-name')].filter(Boolean);
  const selected = getSelectedTreeModel();
  nameEls.forEach(el => el.textContent = selected.name);
  setTreeLoadStatus(`目前使用：${selected.name}`);
  wraps.forEach(wrap => {
    wrap.innerHTML = '';
    TREE_MODELS.forEach(model => {
      const btn = document.createElement('button');
      btn.className = 'tree-btn' + (model.id === selectedTreeModelId ? ' active' : '');
      btn.type = 'button';
      btn.innerHTML = `<span class="tree-icon">${model.icon}</span><span>${model.name}</span><span class="tree-file">${model.file}</span>`;
      btn.addEventListener('pointerdown', event => {
        event.stopPropagation();
      }, { passive:true });
      btn.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        selectTreeModel(model.id);
        preloadTreeModel(model).then(root => {
          if (selectedTreeModelId === model.id) {
            setTreeLoadStatus(root ? `已載入：${model.name}` : `已選擇：${model.name}（模型讀取失敗時會使用內建樹）`);
          }
        });
      });
      wrap.appendChild(btn);
    });
  });
}


// ── MODE SELECT ──────────────────────────────────
function buildModeSelect() {
  buildTreeSelect();
  const grid = document.getElementById('mode-grid');
  grid.innerHTML = '';
  for (let m = 1; m <= 7; m++) {
    const levels = ALL_LEVELS[m] || [];
    const completed = levels.filter(l => (bestStars[m+'-'+l.id]||0) > 0).length;
    const btn = document.createElement('button');
    btn.className = 'mode-btn';
    btn.innerHTML = `<span class="mode-icon">${MODE_ICONS[m]}</span><span>${MODE_NAMES[m]}</span><span class="mode-prog">${completed}/${levels.length} 關</span>`;
    btn.addEventListener('click', () => {
      currentMode = m;
      buildLevelSelect(m);
      show('s-level');
    });
    grid.appendChild(btn);
  }
}
document.getElementById('btn-mode-back').addEventListener('click', () => show('s-title'));

// ── LEVEL SELECT ─────────────────────────────────
function buildLevelSelect(mode) {
  document.getElementById('ls-title').textContent = MODE_ICONS[mode] + ' ' + MODE_NAMES[mode];
  const container = document.getElementById('ls-grid');
  container.innerHTML = '';
  const levels = ALL_LEVELS[mode] || [];
  levels.forEach((lv, i) => {
    const key = mode + '-' + lv.id;
    const stars = bestStars[key] || 0;
    const btn = document.createElement('button');
    btn.className = 'lv-btn';
    const starsHTML = [1,2,3].map(n => `<span style="color:${n<=stars?'#f5c842':'#d4b080'}">★</span>`).join('');
    btn.innerHTML = `<span>${lv.id}</span><div class="lv-stars">${starsHTML}</div>`;
    btn.addEventListener('click', () => startLevel(mode, i));
    container.appendChild(btn);
  });
}
document.getElementById('btn-ls-back').addEventListener('click', () => show('s-mode'));

// ── START LEVEL ──────────────────────────────────
function startLevel(mode, idx) {
  currentMode = mode;
  currentLevelIdx = idx;
  const lv = ALL_LEVELS[mode][idx];
  gridSize = lv.size;
  moveTimes = lv.moveTimes;
  isPaused = false;

  // 動態計算 tile-size：根據螢幕較小邊，留出 HUD(64px) + padding(32px) + minimap(~60px) 的空間
  (function() {
    const hudH = 64;
    const padV = 32;
    const padH = 80; // 左右 padding + minimap 寬度
    const availW = window.innerWidth - padH;
    const availH = window.innerHeight - hudH - padV;
    const avail = Math.min(availW, availH);
    const tileSize = Math.floor(Math.min(avail / gridSize, 90)); // 最大 90px
    const clamped = Math.max(tileSize, 48); // 最小 48px
    document.documentElement.style.setProperty('--tile-size', clamped + 'px');
  })();

  // Build cell state from raw grid values
  // "": hidden, "0"/"1": dirt (need tree), "2": already tree (fixed or turns together), "B"/"G": special dirt
  grid = lv.grid.map((v, i) => {
    if (v === '') return { state: 'hidden', raw: v, treeEmoji: '' };
    if (v === '2') return { state: 'tree', raw: v, treeEmoji: randTree(), isFixed: (mode === 2 || mode === 3 || mode === 5 || mode === 6 || mode === 7) };
    return { state: 'dirt', raw: v, treeEmoji: randTree(), isFixed: false };
  });

  // Mode 8 = random
  if (mode === 8) {
    grid = grid.map(c => {
      if (c.state === 'hidden') return c;
      return { ...c, state: Math.random() > 0.5 ? 'tree' : 'dirt' };
    });
  }

  document.getElementById('ov-complete').classList.remove('show');
  document.getElementById('ov-gameover').classList.remove('show');
  show('s-game');
  updateHUD();
  renderMinimap();

  preloadTreeModel(getSelectedTreeModel()).finally(() => {
    // 玩家在讀取模型期間若已切換關卡，就避免舊讀取結果覆蓋新畫面。
    if (currentMode === mode && currentLevelIdx === idx) renderGrid();
  });
}

// ── HUD ──────────────────────────────────────────
function updateHUD() {
  const lv = ALL_LEVELS[currentMode][currentLevelIdx];
  document.getElementById('hud-steps').textContent = '剩餘步數：∞';
  document.getElementById('hud-lv').textContent = `Lv.${currentMode}-${lv.id}`;
}

// ── MINIMAP ──────────────────────────────────────
function renderMinimap() {
  const mm = document.getElementById('minimap');
  mm.style.gridTemplateColumns = `repeat(${gridSize}, 14px)`;
  mm.innerHTML = '';
  grid.forEach(cell => {
    const d = document.createElement('div');
    d.className = 'mm-cell' + (cell.state === 'tree' ? ' tree' : cell.state === 'hidden' ? ' hidden' : '');
    mm.appendChild(d);
  });
}

// ── RENDER GRID: THREE.JS 3D VERSION ─────────────
function init3D() {
  if (renderer) return;

  const canvas = document.getElementById('three-canvas');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xb5dea0);
  scene.fog = new THREE.Fog(0xb5dea0, 8, 18);

  camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();

  const hemi = new THREE.HemisphereLight(0xffffff, 0x8dbb76, 1.25);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffffff, 1.45);
  sun.position.set(5, 9, 4);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 1024;
  sun.shadow.mapSize.height = 1024;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0xffe4c8, 0.45);
  fill.position.set(-4, 4, -5);
  scene.add(fill);

  boardGroup = new THREE.Group();
  scene.add(boardGroup);

  canvas.addEventListener('pointerdown', onCanvasPointerDown);
  canvas.addEventListener('pointermove', onCanvasPointerMove);
  canvas.addEventListener('pointerup', onCanvasPointerUp);
  canvas.addEventListener('pointercancel', onCanvasPointerUp);
  canvas.addEventListener('wheel', onCanvasWheel, { passive:false });

  resizeObserver = new ResizeObserver(resize3D);
  resizeObserver.observe(canvas);

  resize3D();
  animate3D();
}

function resize3D() {
  if (!renderer || !camera) return;
  const canvas = renderer.domElement;
  const width = canvas.clientWidth || window.innerWidth;
  const height = canvas.clientHeight || Math.max(320, window.innerHeight - 76);
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  updateCamera();
}

function updateCamera() {
  if (!camera) return;
  const target = new THREE.Vector3(0, 0, 0);
  const x = Math.cos(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
  const y = Math.sin(cameraPitch) * cameraDistance;
  const z = Math.sin(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
  camera.position.set(x, y, z);
  camera.lookAt(target);
  updateZoomUI();
}

function setCameraDistance(nextDistance) {
  cameraDistance = Math.max(CAMERA_MIN_DISTANCE, Math.min(CAMERA_MAX_DISTANCE, nextDistance));
  updateCamera();
}

function updateZoomUI() {
  const fill = document.getElementById('zoom-fill');
  if (!fill) return;
  const ratio = 1 - ((cameraDistance - CAMERA_MIN_DISTANCE) / (CAMERA_MAX_DISTANCE - CAMERA_MIN_DISTANCE));
  fill.style.height = `${Math.round(Math.max(0, Math.min(1, ratio)) * 100)}%`;
}

function animate3D() {
  requestAnimationFrame(animate3D);
  if (boardGroup) {
    boardGroup.children.forEach(obj => {
      if (obj.userData.floatSeed !== undefined && obj.userData.treeMesh) {
        obj.userData.treeMesh.rotation.y += 0.003;
      }
    });
  }
  if (renderer && scene && camera) renderer.render(scene, camera);
}

function clearBoard3D() {
  if (!boardGroup) return;
  boardGroup.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
  boardGroup.clear();
  clickableTiles = [];
}

function renderGrid() {
  init3D();
  clearBoard3D();

  const spacing = 1.18;
  const offset = (gridSize - 1) * spacing / 2;
  setCameraDistance(Math.max(6.2, gridSize * 1.85));

  const groundGeo = new THREE.CircleGeometry(gridSize * 1.05, 48);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x9acc78, roughness: 1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.18;
  ground.receiveShadow = true;
  boardGroup.add(ground);

  grid.forEach((cell, idx) => {
    if (cell.state === 'hidden') return;
    const col = idx % gridSize;
    const row = Math.floor(idx / gridSize);
    const x = col * spacing - offset;
    const z = row * spacing - offset;
    createTile3D(cell, idx, x, z);
  });
}

function makeTile(cell, idx) {
  // 舊版 DOM tile 保留空殼，3D 版不再使用。
  const tile = document.createElement('div');
  tile.dataset.idx = idx;
  return tile;
}

function createTile3D(cell, idx, x, z) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  group.userData.idx = idx;
  group.userData.floatSeed = Math.random() * Math.PI * 2;

  const color = getCellColor(cell);
  const boxGeo = new THREE.BoxGeometry(1, 0.28, 1);
  const boxMat = new THREE.MeshStandardMaterial({
    color,
    roughness: 0.82,
    metalness: 0.02
  });
  const tile = new THREE.Mesh(boxGeo, boxMat);
  tile.position.y = 0;
  tile.castShadow = true;
  tile.receiveShadow = true;
  tile.userData.idx = idx;
  tile.userData.kind = 'tile';
  group.add(tile);

  const bevelGeo = new THREE.BoxGeometry(0.92, 0.035, 0.92);
  const bevelMat = new THREE.MeshStandardMaterial({ color: lightenColor(color, 1.18), roughness: 0.9 });
  const top = new THREE.Mesh(bevelGeo, bevelMat);
  top.position.y = 0.158;
  top.userData.idx = idx;
  top.userData.kind = 'tile';
  top.receiveShadow = true;
  group.add(top);

  const lv = ALL_LEVELS[currentMode][currentLevelIdx];
  if (lv.isTargetMode) addTargetMarker3D(group, cell);

  cell.group = group;
  cell.tileMesh = tile;
  cell.topMesh = top;
  cell.treeMesh = null;

  if (cell.state === 'tree') addTree3D(cell, false);

  boardGroup.add(group);
  clickableTiles.push(tile, top);
}

function getCellColor(cell) {
  if (cell.state === 'tree' && cell.isFixed) return 0xa8cc40;
  if (cell.state === 'tree') return 0x6eb840;
  if (cell.raw === 'B') return 0xb98f6a;
  if (cell.raw === 'G') return 0xd7a05d;
  return 0xc47848;
}

function lightenColor(hex, amount) {
  const c = new THREE.Color(hex);
  c.r = Math.min(1, c.r * amount);
  c.g = Math.min(1, c.g * amount);
  c.b = Math.min(1, c.b * amount);
  return c;
}

function addTargetMarker3D(group, cell) {
  if (cell.raw !== '1' && cell.raw !== '2') return;
  const markerColor = cell.raw === '1' ? 0xf5c842 : 0x50c878;
  const ringGeo = new THREE.TorusGeometry(0.42, 0.025, 8, 36);
  const ringMat = new THREE.MeshStandardMaterial({ color: markerColor, emissive: markerColor, emissiveIntensity: 0.18 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.2;
  group.add(ring);
}

function addTree3D(cell, animate = true) {
  if (!cell.group || cell.treeMesh) return;

  const tree = new THREE.Group();
  tree.position.y = 0.2;

  const selectedModel = getSelectedTreeModel();
  const cached = treeModelCache.get(selectedModel.id);

  if (cached) {
    cached.then(root => {
      // 如果等待模型時這格已經不是樹，或已經被其他樹物件佔用，就不要補模型。
      if (!root || !cell.group || cell.state !== 'tree' || cell.treeMesh !== tree) return;

      tree.clear();
      const model = cloneTreeModel(root);
      if (!model) return;
      normalizeTreeModel(model);
      model.rotation.y = Math.random() * Math.PI * 2;
      tree.add(model);
    });
  } else {
    preloadTreeModel(selectedModel).then(root => {
      if (!root || !cell.group || cell.state !== 'tree' || cell.treeMesh !== tree) return;
      tree.clear();
      const model = cloneTreeModel(root);
      if (!model) return;
      normalizeTreeModel(model);
      model.rotation.y = Math.random() * Math.PI * 2;
      tree.add(model);
    });
  }

  // 模型還沒讀取完成時，先放一棵簡單的低多邊形樹，避免畫面空白。
  const fallback = createFallbackTree3D(cell);
  tree.add(fallback);

  cell.treeMesh = tree;
  cell.group.userData.treeMesh = tree;
  cell.group.add(tree);

  if (animate) {
    tree.scale.set(0.05, 0.05, 0.05);
    growObject(tree, 1, 180);
  }
}

function createFallbackTree3D(cell) {
  const fallback = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(0.07, 0.095, 0.45, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8a5a32, roughness: 0.85 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 0.25;
  trunk.castShadow = true;
  fallback.add(trunk);

  const leafMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.75 });
  const cone1 = new THREE.Mesh(new THREE.ConeGeometry(0.36, 0.65, 12), leafMat);
  cone1.position.y = 0.72;
  cone1.castShadow = true;
  fallback.add(cone1);

  const cone2 = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.52, 12), leafMat);
  cone2.position.y = 1.05;
  cone2.castShadow = true;
  fallback.add(cone2);

  return fallback;
}

function growObject(obj, targetScale = 1, duration = 180) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const s = 0.05 + (targetScale - 0.05) * ease;
    obj.scale.set(s, s, s);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateCell3D(idx, isNeighbour = false) {
  const cell = grid[idx];
  if (!cell || !cell.tileMesh) return;

  const color = getCellColor(cell);
  cell.tileMesh.material.color.setHex(color);
  if (cell.topMesh) cell.topMesh.material.color.set(lightenColor(color, 1.18));

  if (cell.state === 'tree') {
    addTree3D(cell, true);
  } else if (cell.treeMesh) {
    cell.group.remove(cell.treeMesh);
    cell.treeMesh.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    });
    cell.treeMesh = null;
    cell.group.userData.treeMesh = null;
  }

  bounceTile3D(idx, isNeighbour ? 0.12 : 0.22);
}

function bounceTile3D(idx, height = 0.18) {
  const cell = grid[idx];
  if (!cell || !cell.group) return;
  const group = cell.group;
  const startY = group.position.y;
  const start = performance.now();
  const duration = 180;
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    group.position.y = startY + Math.sin(t * Math.PI) * height;
    if (t < 1) requestAnimationFrame(step);
    else group.position.y = startY;
  }
  requestAnimationFrame(step);
}

function onCanvasPointerDown(event) {
  isDraggingView = true;
  dragStarted = false;
  dragStartX = dragLastX = event.clientX;
  dragStartY = dragLastY = event.clientY;
  renderer.domElement.setPointerCapture?.(event.pointerId);
}

function onCanvasPointerMove(event) {
  if (!isDraggingView) return;
  const dx = event.clientX - dragLastX;
  const dy = event.clientY - dragLastY;
  const total = Math.hypot(event.clientX - dragStartX, event.clientY - dragStartY);
  if (total > 5) dragStarted = true;
  if (dragStarted) {
    cameraYaw -= dx * 0.006;
    cameraPitch = Math.max(0.45, Math.min(1.15, cameraPitch + dy * 0.004));
    updateCamera();
  }
  dragLastX = event.clientX;
  dragLastY = event.clientY;
}

function onCanvasPointerUp(event) {
  if (!isDraggingView) return;
  isDraggingView = false;
  renderer.domElement.releasePointerCapture?.(event.pointerId);
  if (!dragStarted) pickTileFromPointer(event);
}

function onCanvasWheel(event) {
  event.preventDefault();
  setCameraDistance(cameraDistance + event.deltaY * 0.006);
}

function pickTileFromPointer(event) {
  if (isPaused || !renderer || !camera) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(clickableTiles, false);
  if (!hits.length) return;
  const idx = hits[0].object.userData.idx;
  onTileClick(idx);
}

// ── TILE CLICK ────────────────────────────────────
function onTileClick(idx) {
  if (isPaused) return;
  if (!grid[idx] || grid[idx].state === 'hidden') return;

  playRollSound();

  // toggle clicked
  toggleCell(idx, false);

  // toggle neighbours
  const col = idx % gridSize;
  const row = Math.floor(idx / gridSize);
  const neighbours = [];
  if (row > 0)             neighbours.push(idx - gridSize);
  if (row < gridSize - 1)  neighbours.push(idx + gridSize);
  if (col > 0)             neighbours.push(idx - 1);
  if (col < gridSize - 1)  neighbours.push(idx + 1);
  neighbours.forEach(n => { if (grid[n].state !== 'hidden') toggleCell(n, true); });

  renderMinimap();

  setTimeout(() => {
    if (checkWin()) winGame();
  }, 80);
}

function toggleCell(idx, isNeighbour) {
  const cell = grid[idx];
  if (!cell || cell.state === 'hidden') return;
  cell.state = cell.state === 'tree' ? 'dirt' : 'tree';
  updateCell3D(idx, isNeighbour);
}

// ── WIN / LOSE ────────────────────────────────────
function checkWin() {
  return grid.every(c => c.state === 'tree' || c.state === 'hidden');
}

function winGame() {
  isPaused = true;
  playFinishSound();
  const lv = ALL_LEVELS[currentMode][currentLevelIdx];
  const stars = 3; // 過關永遠三星
  const key = currentMode + '-' + lv.id;
  if ((bestStars[key] || 0) < stars) bestStars[key] = stars;

  const starsEl = document.getElementById('ov-stars');
  starsEl.innerHTML = [1,2,3].map((n,i) =>
    `<span class="ov-star" style="animation-delay:${0.08+i*.15}s">${n<=stars?'⭐':'☆'}</span>`
  ).join('');
  document.getElementById('ov-lv-text').textContent = `Lv.${currentMode}-${lv.id}`;

  const hasNext = currentLevelIdx < ALL_LEVELS[currentMode].length - 1;
  document.getElementById('btn-next').style.display = hasNext ? '' : 'none';
  document.getElementById('ov-complete').classList.add('show');
}

function loseGame() {
  isPaused = true;
  document.getElementById('ov-gameover').classList.add('show');
}

// ── BUTTONS ──────────────────────────────────────

function bindZoomButton(id, delta) {
  const btn = document.getElementById(id);
  if (!btn) return;
  let holdTimer = null;
  let repeatTimer = null;
  const stop = () => {
    clearTimeout(holdTimer);
    clearInterval(repeatTimer);
    holdTimer = null;
    repeatTimer = null;
  };
  const step = (event) => {
    event?.preventDefault?.();
    event?.stopPropagation?.();
    setCameraDistance(cameraDistance + delta);
  };
  btn.addEventListener('click', step);
  btn.addEventListener('pointerdown', (event) => {
    event.preventDefault();
    event.stopPropagation();
    step(event);
    holdTimer = setTimeout(() => {
      repeatTimer = setInterval(() => setCameraDistance(cameraDistance + delta), 80);
    }, 260);
  });
  btn.addEventListener('pointerup', stop);
  btn.addEventListener('pointercancel', stop);
  btn.addEventListener('pointerleave', stop);
}

bindZoomButton('zoom-in', -0.55);
bindZoomButton('zoom-out', 0.55);
const zoomControl = document.getElementById('zoom-control');
if (zoomControl) {
  ['pointerdown','pointermove','pointerup','click','touchstart','touchmove'].forEach(type => {
    zoomControl.addEventListener(type, event => event.stopPropagation(), { passive:false });
  });
}

document.getElementById('btn-back-game').addEventListener('click', () => { buildLevelSelect(currentMode); show('s-level'); });
document.getElementById('btn-reset-game').addEventListener('click', () => startLevel(currentMode, currentLevelIdx));
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentLevelIdx < ALL_LEVELS[currentMode].length - 1) startLevel(currentMode, currentLevelIdx + 1);
  else { buildLevelSelect(currentMode); show('s-level'); }
});
document.getElementById('btn-restart-ok').addEventListener('click', () => startLevel(currentMode, currentLevelIdx));
document.getElementById('btn-menu-ok').addEventListener('click', () => { buildLevelSelect(currentMode); show('s-level'); });
document.getElementById('btn-restart-go').addEventListener('click', () => startLevel(currentMode, currentLevelIdx));
document.getElementById('btn-menu-go').addEventListener('click', () => { buildLevelSelect(currentMode); show('s-level'); });

// ── RESIZE: 旋轉/縮放視窗時更新 3D canvas ─────────
window.addEventListener('resize', function() {
  if (document.getElementById('s-game').classList.contains('active')) {
    resize3D();
    renderMinimap();
  }
});
</script>
